[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=61.0"]

[project]
authors = [{ name = "Your Name", email = "you@example.com" }]
dependencies = ["typer>=0.9.0", "Pillow>=9.0.0"]
description = "Digital Watermarking CLI tool with interactive menu"
name = "digital-watermarking-cli"
requires-python = ">=3.9"
version = "0.1.0"

[project.scripts]
dwm-cli = "digital_watermarking_cli.cli.main:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
digital_watermarking_cli = ["assets/fonts/*.ttf"]
